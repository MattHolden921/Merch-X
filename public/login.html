<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · Merch X</title>
<link rel="stylesheet" href="design-system.css">
<script src="page-key.js" defer></script>
<style>
body{display:grid;place-items:center;padding:24px}
.login{width:min(440px,100%);background:var(--ds-bg-surface);border:1px solid var(--ds-line);border-radius:var(--ds-radius);padding:24px;box-shadow:var(--ds-shadow)}
.brand{margin-bottom:18px}
.brand h1{font-size:24px}
.brand p{font-size:13px;color:var(--ds-text-muted);line-height:1.6}
.actions{justify-content:flex-start;margin-top:18px}
.setup{margin-top:18px;padding-top:14px;border-top:1px solid var(--ds-line)}
</style>
</head>
<body>
<main class="login">
  <div class="brand">
    <h1>Merch X</h1>
    <p>Sign in with your company Google account to continue.</p>
  </div>
  <div class="actions">
    <a class="btn primary" id="google-link" href="/api/auth/google/start">Continue with Google</a>
  </div>
  <div class="setup">
    <p class="status" id="status-note">Checking sign-in configuration.</p>
  </div>
</main>
<script>
const params=new URLSearchParams(location.search);
const next=params.get("next")||"/";
document.getElementById("google-link").href=`/api/auth/google/start?next=${encodeURIComponent(next)}`;
fetch("/api/auth/me").then(response=>response.json()).then(data=>{
  if(data.user&&data.user.isActive){
    location.href=next.startsWith("/")?next:"/";
    return;
  }
  const note=document.getElementById("status-note");
  if(data.authMode==="google")note.textContent="Google Workspace sign-in is enabled.";
  else if(data.authMode==="basic")note.textContent="This environment is using shared-password fallback.";
  else note.textContent="This environment does not require sign-in.";
}).catch(()=>{document.getElementById("status-note").textContent="Sign-in status is unavailable.";});
</script>
</body>
</html>
