<main class="wrap">
  <a class="home" href="/">Home</a>

      <h1>Orders</h1>

    <div class="actions">
      <a class="btn" href="order-form.html">New order</a>

<script>
const money=new Intl.NumberFormat("en-GB",{style:"currency",currency:"GBP"});

const dateFmt=new Intl.DateTimeFormat("en-GB",{day:"2-digit",month:"short",year:"numeric"});
const naturalSort=new Intl.Collator("en-GB",{numeric:true,sensitivity:"base"});
const API_ORIGINS=location.protocol==="file:"?["http://localhost:3003","http://localhost:3001","http://localhost:3000"]:[""];
const approvalStatuses=["Not requested","Pending director approval","Approved","Changes requested","Rejected"];
const paymentStatuses=["Not due","Awaiting invoice","Ready to pay","Part paid","Paid","Overdue"];
const deliveryReviewStatus="Review after delivery";
const statusFilterPinned=[deliveryReviewStatus];

const batchPaymentStatuses=["Awaiting invoice","Ready to pay","Part paid","Paid","Query"];
const batchIntakeStatuses=["Not confirmed","Confirmed","In production","Shipped","Delayed","Part received","Received"];
const invoiceTypes=["Deposit invoice","Balance invoice","Full invoice","Credit note","Other"];
const invoiceStatuses=["Awaiting FD","Sent to FD","Paid","Query"];
const discrepancyStatuses=["Open","Credit requested","Credit received","Replacement expected","Replacement received","Accepted variance","Written off","Resolved"];
const discrepancyResolutionTypes=[
  {value:"",label:"No resolution"},
  {value:"credit_note",label:"Credit note"},
  {value:"replacement",label:"Replacement"},
  {value:"accepted_variance",label:"Accepted variance"},
  {value:"write_off",label:"Write-off"},
  {value:"corrected_receipt",label:"Corrected receipt"}
];

let state={orders:[],selectedId:new URLSearchParams(location.search).get("id")||"",selected:null,events:[],invoices:[],batches:[],batchLines:[],receiptLines:[],discrepancies:[],labelJobs:[],labelValidation:null,labelSettings:{sparePerSku:0,placementInstructions:""},pahSettings:{},metrics:null,users:[],editingInvoiceId:"",invoiceEditorOpen:false,editingBatchId:"",batchEditorOpen:false,receivingBatchId:"",lineBatchFilter:"all",liveCheck:null,authMode:"none",currentUser:null};

const el=id=>document.getElementById(id);
const val=id=>el(id)?.value?.trim()||"";
const setVal=(id,value)=>{const node=el(id);if(node)node.value=value??"";};

async function apiFetch(path,options){
  let lastError;
  for(const origin of API_ORIGINS){
    try{
      const response=await fetch(`${origin}${path}`,options);
      if(response.ok||response.status>=400)return response;
      lastError=new Error(`API returned ${response.status}`);
    }catch(error){
      lastError=error;
    }
  }
  throw lastError||new Error("API unavailable");
}

function escapeHtml(value){
  return String(value||"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
}

function attr(value){
  return escapeHtml(value).replaceAll("`","&#96;");
}

function formatDate(value){
  if(!value)return "";
  const date=new Date(`${value}T00:00:00`);
  return Number.isNaN(date.getTime())?value:dateFmt.format(date);
}

function formatCurrency(value,currency){
  const code=String(currency||"GBP").toUpperCase();
  if(code==="GBP")return money.format(Number(value||0));
  if(code==="EUR")return eurMoney.format(Number(value||0));
  try{
    return new Intl.NumberFormat("en-GB",{style:"currency",currency:code}).format(Number(value||0));
  }catch(error){
    return `${Number(value||0).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2})} ${code}`;
  }
}

function orderFxRate(order){
  return Number(order?.fxRate||order?.order?.fxRate||order?.order?.totals?.fxRate||0);
}

function orderTotalGbp(order){
  const lines=order?.order?.lines||order?.lines||[];
  const lineTotal=lines.reduce((sum,line)=>sum+lineCostGbp(line),0);
  return Number(lineTotal||order?.subtotal||order?.order?.totals?.subtotal||order?.totalGbp||order?.total||order?.order?.totals?.grand||0);
}

function gbpToEur(value,order){
  const rate=orderFxRate(order);
  return rate?Number(value||0)/rate:0;
}

function eurToGbp(value,order){
  const rate=orderFxRate(order);
  return rate?Number(value||0)*rate:Number(value||0);
}

function balanceAfterTolerance(value,tolerance){
  const amount=Math.max(0,Number(value||0));
  return amount<=Number(tolerance||0)?0:amount;
}

function invoiceBalanceToleranceGbp(order){
  return Number(order?.invoices?.balanceToleranceGbp||INVOICE_BALANCE_TOLERANCE_GBP);
}

function moneyPairFromGbp(value,order){
  const gbp=Number(value||0);
  const eur=gbpToEur(gbp,order);
  return orderFxRate(order)?`${money.format(gbp)} / ${eurMoney.format(eur)}`:`${money.format(gbp)} / EUR n/a`;
}

function invoiceAmountGbp(invoice,order){
  const amount=Number(invoice?.amount||0);
  return String(invoice?.currency||"GBP").toUpperCase()==="EUR"?eurToGbp(amount,order):amount;
}

function invoiceAmountEur(invoice,order){
  const amount=Number(invoice?.amount||0);
  return String(invoice?.currency||"GBP").toUpperCase()==="EUR"?amount:gbpToEur(amount,order);
}

function invoiceDocumentKind(invoice){
  const raw=String(invoice?.documentKind||"").trim();
  if(raw==="credit_note")return"credit_note";
  return String(invoice?.invoiceType||"").trim().toLowerCase()==="credit note"?"credit_note":"invoice";
}

function invoiceSign(invoice){
  return invoiceDocumentKind(invoice)==="credit_note"?-1:1;
}

function signedInvoiceAmountGbp(invoice,order){
  return invoiceAmountGbp(invoice,order)*invoiceSign(invoice);
}

function signedInvoiceAmountEur(invoice,order){
  return invoiceAmountEur(invoice,order)*invoiceSign(invoice);
}

function invoiceDefaultAmount(order,currency){
  const code=String(currency||order?.currency||"GBP").toUpperCase();
  return code==="EUR"&&orderFxRate(order)?gbpToEur(orderTotalGbp(order),order):orderTotalGbp(order);
}

function lineUnitGbp(line){
  return Number(line?.unitCostGbp||line?.unitCost||0);
}

function lineUnitEur(line,order){
  const eur=Number(line?.unitCostEur||0);
  return eur||gbpToEur(lineUnitGbp(line),order);
}

function lineCostGbp(line){
  const quantity=Number(line?.quantity||0);
  return Number(line?.lineCost||(quantity*Number(line?.unitCostGbp||line?.unitCost||0))||0);
}

function lineCostEur(line,order){
  const qty=Number(line?.quantity||0);
  const eur=lineUnitEur(line,order);
  return eur?eur*qty:gbpToEur(lineCostGbp(line),order);
}

function options(items,value,blank){

function badgeClass(value){
  if(["Approved","Paid","Received","Payment complete","Complete","Credit received","Replacement received","Accepted variance","Written off","Resolved"].includes(value))return"good";
  if([deliveryReviewStatus].includes(value))return"warn";
  if(["Pending director approval","Ready to pay","Part paid","Part shipped","Part received","Shipped","Confirmed","In production","Awaiting approval","Sent to FD","Shopify linked","Synced draft","Shopify draft","Live","Credit requested","Replacement expected"].includes(value))return"info";
  if(["Changes requested","Awaiting invoice","Delayed","Overdue","Rejected","Query","Product sync","Needs Shopify","Missing SKU","Product hold","Open"].includes(value))return value==="Overdue"||value==="Rejected"?"bad":"warn";
  return "";
}

function productCompletionBadge(order){

function liveCheckForOrder(order){

function liveCheckResultForLine(order,lineIndex){

function liveNewArrivalsFlag(order,lineIndex){
  const result=liveCheckResultForLine(order,lineIndex);
  if(!result)return "";
  const badge=result.ok?"good":result.error?"bad":"warn";
  const detail=result.error||result.message||`${result.isLive?"Live":"Not live"} / ${result.hasNewArrivalsTag?"New Arrivals":"No New Arrivals tag"}`;
  const link=result.shopifyAdminUrl?` · <a href="${attr(result.shopifyAdminUrl)}" target="_blank">Shopify</a>`:"";
  return `<span class="money-sub">Live/New In: <span class="badge ${badge}">${result.ok?"Y":"N"}</span> ${escapeHtml(detail)}${link}</span>`;
}

function liveNewArrivalsExportFields(order,lineIndex){
  const result=liveCheckResultForLine(order,lineIndex);
  if(!result)return ["","","","","","",""];
  return [
    result.ok?"Y":"N",
    result.isLive?"Y":"N",
    result.hasNewArrivalsTag?"Y":"N",
    result.shopifyStatus||"",
    result.message||result.error||"",
    result.shopifyAdminUrl||"",

}

function liveCheckSummary(order){
  const check=liveCheckForOrder(order);
  if(!check)return "";
  if(check.configured===false)return `<div class="status warn" style="margin-bottom:10px">${escapeHtml(check.message||"Shopify credentials are not configured.")}</div>`;
  const summary=check.summary||{};
  const checkedAt=check.checkedAt?new Date(check.checkedAt):null;
  const checkedLabel=checkedAt&&!Number.isNaN(checkedAt.getTime())?` · ${checkedAt.toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}`:"";
  const type=Number(summary.ok||0)===Number(summary.lines||0)?"ok":"warn";
  return `<div class="status ${type}" style="margin-bottom:10px">Live/New Arrivals check: ${Number(summary.ok||0).toLocaleString("en-GB")} of ${Number(summary.lines||0).toLocaleString("en-GB")} line${Number(summary.lines||0)===1?"":"s"} = Y${checkedLabel}</div>`;
}

function metric(label,value,small){

function recalcMetrics(){
  const todayIso=new Date().toISOString().slice(0,10);
  const activeOrders=state.orders.filter(order=>!order.archivedAt);
  state.metrics={
    totalOrders:activeOrders.length,
    awaitingApproval:activeOrders.filter(order=>order.workflow.approvalStatus==="Pending director approval").length,
    readyToPay:activeOrders.filter(order=>["Ready to pay","Overdue"].includes(order.workflow.paymentStatus)||(order.workflow.paymentStatus==="Part paid"&&order.workflow.nextActionOwner==="FD / Finance")).length,
    intakeRisk:activeOrders.filter(order=>order.workflow.intakeStatus==="Delayed"||(order.workflow.intakeEtaDate&&![deliveryReviewStatus,"Received"].includes(order.workflow.intakeStatus)&&order.workflow.intakeEtaDate<todayIso)).length,
    productBlocked:activeOrders.filter(order=>!productCompletion(order).complete).length
  };
}

function filterOrders(){
  const search=val("search").toLowerCase();
  const status=val("status-filter");
  const owner=val("owner-filter");
  const role=val("role-filter");
  const archiveMode=val("archive-filter")||"active";
  const orders=state.orders.filter(order=>{
    if(archiveMode==="active"&&order.archivedAt)return false;
    if(archiveMode==="archived"&&!order.archivedAt)return false;
    const haystack=[
      order.orderNumber,order.supplierName,order.buyerName,order.buyerEmail,order.compositeStatus,
      productCompletion(order).summary,...(productCompletion(order).lines||[]).flatMap(line=>[line.status,line.source]),
      ...(order.categories||[]),...(order.order?.lines||[]).flatMap(line=>[line.sku,line.style,line.buyingCode])
    ].join(" ").toLowerCase();
    return (!search||haystack.includes(search))
      &&(!status||order.compositeStatus===status)
      &&(!owner||order.workflow.nextActionOwner===owner)
      &&(!role||order.workflow.nextActionOwner===role);
  });
  const direction=val("sort-filter")==="po-asc"?1:-1;
  return orders.sort((a,b)=>naturalSort.compare(String(a.orderNumber||""),String(b.orderNumber||""))*direction);
}

function filteredSummary(orders){
  const styles=new Set();
  const summary=orders.reduce((total,order)=>{
    const lines=order.order?.lines||[];
    total.orders+=1;
    total.units+=Number(order.units||0);
    total.cost+=orderTotalGbp(order);
    total.costEur+=gbpToEur(orderTotalGbp(order),order);
    total.retail+=Number(order.order?.totals?.totalRrp||lines.reduce((sum,line)=>sum+Number(line.lineRrp||0),0));
    lines.forEach(line=>{
      const style=String(line.style||line.description||line.sku||"").trim().toLowerCase();
      if(style)styles.add(style);
    });
    return total;
  },{orders:0,units:0,cost:0,costEur:0,retail:0});
  summary.styles=styles.size;
  return summary;
}

function financeSummary(orders){
  return orders.reduce((total,order)=>{
    const invoices=order.invoices||{};
    const orderValue=orderTotalGbp(order);
    total.orders+=1;
    total.orderValue+=orderValue;
    total.orderValueEur+=Number(invoices.orderTotalEur||gbpToEur(orderValue,order));
    total.invoices+=Number(invoices.count||0);
    total.invoiced+=Number(invoices.totalDue||0);
    total.invoicedEur+=Number(invoices.totalDueEur||gbpToEur(invoices.totalDue||0,order));
    total.paid+=Number(invoices.totalPaid||0);
    total.paidEur+=Number(invoices.totalPaidEur||gbpToEur(invoices.totalPaid||0,order));
    total.outstandingInvoiced+=Number(invoices.outstandingInvoiced||0);
    total.outstandingInvoicedEur+=Number(invoices.outstandingInvoicedEur||gbpToEur(invoices.outstandingInvoiced||0,order));
    total.uninvoicedBalance+=Number(invoices.uninvoicedBalance||0);
    total.uninvoicedBalanceEur+=Number(invoices.uninvoicedBalanceEur||gbpToEur(invoices.uninvoicedBalance||0,order));
    total.awaitingPayment+=Number(invoices.outstanding||0);
    total.awaitingPaymentEur+=Number(invoices.outstandingEur||gbpToEur(invoices.outstanding||0,order));
    return total;
  },{orders:0,orderValue:0,orderValueEur:0,invoices:0,invoiced:0,invoicedEur:0,paid:0,paidEur:0,outstandingInvoiced:0,outstandingInvoicedEur:0,uninvoicedBalance:0,uninvoicedBalanceEur:0,awaitingPayment:0,awaitingPaymentEur:0});
}

async function savePahSettings(){

const code128Patterns=["212222","222122","222221","121223","121322","131222","122213","122312","132212","221213","221312","231212","112232","122132","122231","113222","123122","123221","223211","221132","221231","213212","223112","312131","311222","321122","321221","312212","322112","322211","212123","212321","232121","111323","131123","131321","112313","132113","132311","211313","231113","231311","112133","112331","132131","113123","113321","133121","313121","211331","231131","213113","213311","213131","311123","311321","331121","312113","312311","332111","314111","221411","431111","111224","111422","121124","121421","141122","141221","112214","112412","122114","122411","142112","142211","241211","221114","413111","241112","134111","111242","121142","121241","114212","124112","124211","411212","421112","421211","212141","214121","412121","111143","111341","131141","114113","114311","411113","411311","113141","114131","311141","411131","211412","211214","211232","2331112"];

function code128Svg(value){
  const input=String(value||"").toUpperCase();
  if(!input||!/^[\x20-\x7e]+$/.test(input))return "";
  const data=[...input].map(character=>character.charCodeAt(0)-32);
  let checksum=104;
  data.forEach((code,index)=>{checksum+=code*(index+1);});
  const codes=[104,...data,checksum%103,106];
  const quiet=10;
  const moduleCount=codes.reduce((total,code)=>total+code128Patterns[code].split("").reduce((sum,width)=>sum+Number(width),0),quiet*2);
  let x=quiet;
  const bars=[];
  for(const code of codes){
    [...code128Patterns[code]].forEach((width,index)=>{
      const modules=Number(width);
      if(index%2===0)bars.push(`<rect x="${x}" y="0" width="${modules}" height="42"/>`);
      x+=modules;
    });
  }
  return `<svg class="barcode" viewBox="0 0 ${moduleCount} 42" role="img" aria-label="Code 128 barcode ${attr(input)}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${bars.join("")}</svg>`;
}

  return batchDisplayName(batchById(filter)||{});
}

function warehouseReportLines(lines){
  const filter=state.lineBatchFilter||"all";
  return lines.map((line,index)=>{
    const orderedQuantity=Math.max(0,Number(line.quantity||0));
    let quantity=orderedQuantity;
    if(filter==="unbatched")quantity=Math.max(0,orderedQuantity-allocatedQuantityForLine(index));
    if(filter!=="all"&&filter!=="unbatched"){
      quantity=allocationsForLine(index)
        .filter(allocation=>allocation.batchId===filter)
        .reduce((total,allocation)=>total+Number(allocation.quantity||0),0);
    }
    return {line,index,quantity};
  }).filter(item=>item.quantity>0);
}

function warehouseImageUrl(value){
  const raw=String(value||"").trim();
  if(!raw)return "";
  if(/^data:image\//i.test(raw))return raw;
  try{
    const url=new URL(raw,location.href);
    return ["http:","https:"].includes(url.protocol)?url.href:"";
  }catch(error){
    return "";
  }
}

function batchTotals(order,batches){
  const orderUnits=Number(order.units||0);
  const expectedUnits=batches.reduce((total,batch)=>total+Number(batch.units||0),0);
  const expectedStyles=batches.reduce((total,batch)=>total+Number(batch.styleCount||0),0);
  let receivedUnits=0;
  let acceptedUnits=0;
  let damagedUnits=0;
  let shortUnits=0;
  for(const batch of batches){
    const receipts=receiptLinesForBatch(batch.id);
    if(receipts.length){
      const totals=receiptTotals(receipts);
      receivedUnits+=totals.receivedQuantity;
      acceptedUnits+=totals.acceptedQuantity;
      damagedUnits+=totals.damagedQuantity;
      shortUnits+=totals.shortQuantity;
    }else if(batch.intakeStatus==="Received"){
      receivedUnits+=Number(batch.units||0);
      acceptedUnits+=Number(batch.units||0);
    }
  }
  return {
    count:batches.length,
    expectedUnits,
    expectedStyles,
    receivedUnits,
    acceptedUnits,
    damagedUnits,
    shortUnits,
    outstandingUnits:Math.max(0,(orderUnits||expectedUnits)-acceptedUnits)
  };
}

function receiptLinesForBatch(batchId){
  return (state.receiptLines||[]).filter(line=>line.batchId===batchId);
}

function receiptLineFor(batchId,lineIndex){
  return receiptLinesForBatch(batchId).find(line=>Number(line.lineIndex)===Number(lineIndex))||null;
}

function receiptTotals(lines){
  return (lines||[]).reduce((sum,line)=>{
    sum.expectedQuantity+=Number(line.expectedQuantity||0);
    sum.receivedQuantity+=Number(line.receivedQuantity||0);
    sum.damagedQuantity+=Number(line.damagedQuantity||0);
    sum.acceptedQuantity+=Number(line.acceptedQuantity||0);
    sum.shortQuantity+=Number(line.shortQuantity||0);
    sum.overQuantity+=Number(line.overQuantity||0);
    return sum;
  },{expectedQuantity:0,receivedQuantity:0,damagedQuantity:0,acceptedQuantity:0,shortQuantity:0,overQuantity:0});
}

function renderReceiptLineRow(order,batchId,allocation){
  const lineIndex=Number(allocation.lineIndex||0);
  const line=(order.order?.lines||[])[lineIndex]||{};
  const receipt=batchId==="__full_order"?null:receiptLineFor(batchId,lineIndex);
  const expected=Number(allocation.quantity||0);
  const received=receipt?Number(receipt.receivedQuantity||0):expected;
  const damaged=receipt?Number(receipt.damagedQuantity||0):0;
  const accepted=receipt?Number(receipt.acceptedQuantity||0):Math.max(0,received-damaged);

  const over=receipt?Number(receipt.overQuantity||0):Math.max(0,received-expected);
  return `<tr>
    <td><strong>${escapeHtml(line.sku||allocation.sku||"")}</strong><span class="money-sub">${escapeHtml(line.style||allocation.style||"")} ${escapeHtml(line.colour||line.color||"")}</span></td>

function setReceiptImportStatus(message,type="ok"){

function ensureXlsxLibrary(){
  if(window.XLSX)return Promise.resolve();
  return new Promise((resolve,reject)=>{
    const existing=document.querySelector('script[data-xlsx-loader="orders"]');
    if(existing){
      existing.addEventListener("load",()=>resolve(),{once:true});
      existing.addEventListener("error",()=>reject(new Error("Excel import library could not be loaded. Check your internet connection and try again.")),{once:true});
      return;
    }
    const script=document.createElement("script");
    script.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    script.dataset.xlsxLoader="orders";
    script.onload=()=>resolve();
    script.onerror=()=>{
      script.remove();
      reject(new Error("Excel import library could not be loaded. Check your internet connection and try again."));
    };
    document.head.appendChild(script);
  });
}

function readWorkbookRows(file){
  return ensureXlsxLibrary().then(()=>new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const workbook=XLSX.read(new Uint8Array(reader.result),{type:"array"});
        const sheetName=workbook.SheetNames[0];
        const sheet=workbook.Sheets[sheetName];
        if(!sheet)throw new Error("That workbook does not contain a readable sheet.");
        resolve(XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,defval:"",blankrows:false}));
      }catch(error){
        reject(error);
      }
    };
    reader.onerror=()=>reject(new Error("Could not read warehouse report."));
    reader.readAsArrayBuffer(file);
  }));
}

function receiptLineImportMap(order,batchId){
  const parser=window.MerchOrderReceiptImport;
  const lines=order.order?.lines||[];
  const map=new Map();
  for(const allocation of receiptExpectedLines(order,batchId)){
    const lineIndex=Number(allocation.lineIndex||0);
    const line=lines[lineIndex]||{};
    const sku=parser.normalizeSku(line.sku||allocation.sku||"");
    if(!sku)continue;
    if(!map.has(sku))map.set(sku,[]);
    map.get(sku).push({allocation,line,lineIndex});
  }
  return map;
}

function updateReceiptVariancePreview(lineIndex,expectedQuantity){
  const received=Number(val(receiptInputId("received",lineIndex))||0);
  const short=Math.max(0,Number(expectedQuantity||0)-received);
  const over=Math.max(0,received-Number(expectedQuantity||0));
  const shortNode=el(receiptInputId("short",lineIndex));
  const overNode=el(receiptInputId("over",lineIndex));
  if(shortNode)shortNode.textContent=short.toLocaleString("en-GB");
  if(overNode)overNode.textContent=over.toLocaleString("en-GB");
}

function setImportedReceiptLine(match,imported){
  const received=Math.max(0,Number(imported.receivedQuantity||0));
  const damaged=Math.min(received,Math.max(0,Number(imported.damagedQuantity||0)));
  const accepted=Math.min(received,Math.max(0,Number(imported.acceptedQuantity??(received-damaged))));
  setVal(receiptInputId("received",match.lineIndex),received);
  setVal(receiptInputId("damaged",match.lineIndex),damaged);
  setVal(receiptInputId("accepted",match.lineIndex),accepted);
  if(imported.notes)setVal(receiptInputId("notes",match.lineIndex),imported.notes);
  updateReceiptVariancePreview(match.lineIndex,match.allocation.quantity);
}

function orderReferenceMatchesImport(order,references){
  const parser=window.MerchOrderReceiptImport;
  const orderNumber=parser.normalizeSku(order?.orderNumber||"");
  const imported=(references||[]).map(value=>parser.normalizeSku(value)).filter(Boolean);
  return !imported.length||imported.includes(orderNumber);
}

async function importReceiptActualsFromFile(input){
  const file=input?.files?.[0];
  if(!file)return;
  try{
    if(!window.MerchOrderReceiptImport)throw new Error("Receipt import tools are not available.");
    setReceiptImportStatus("Reading warehouse report...");
    const rows=await readWorkbookRows(file);
    const parsed=window.MerchOrderReceiptImport.parseWarehouseReceiptRows(rows);
    if(!parsed.ok)throw new Error(parsed.error||"Could not read warehouse report.");
    const expectedMap=receiptLineImportMap(state.selected,state.receivingBatchId);
    const unmatched=[];
    const ambiguous=[];
    let matched=0;
    for(const imported of parsed.lines||[]){
      const matches=expectedMap.get(imported.normalizedSku)||[];
      if(!matches.length){
        unmatched.push(imported.sku);
        continue;
      }
      if(matches.length>1){
        ambiguous.push(imported.sku);
        continue;
      }
      setImportedReceiptLine(matches[0],imported);
      matched+=1;
    }
    const warnings=[];
    if(!orderReferenceMatchesImport(state.selected,parsed.references))warnings.push(`report reference ${parsed.references.join(", ")} does not match ${state.selected.orderNumber}`);
    if(unmatched.length)warnings.push(`${unmatched.length} unmatched SKU${unmatched.length===1?"":"s"}`);
    if(ambiguous.length)warnings.push(`${ambiguous.length} duplicate order SKU${ambiguous.length===1?"":"s"}`);
    if(parsed.warnings?.length)warnings.push(...parsed.warnings);
    const message=[`${matched.toLocaleString("en-GB")} matched`,`${Number(parsed.totals?.receivedQuantity||0).toLocaleString("en-GB")} received units`,...warnings].join(" · ");
    setReceiptImportStatus(message,warnings.length?"warn":"ok");
  }catch(error){
    setReceiptImportStatus(error.message||"Could not import warehouse report.","err");
  }finally{
    if(input)input.value="";
  }
}

  const lines=expected.map(allocation=>{

    return {

      damagedQuantity:Number(val(receiptInputId("damaged",lineIndex))||0),
      acceptedQuantity:Number(val(receiptInputId("accepted",lineIndex))||0),

  renderFilters();

function invoiceTotals(order,invoices){
  const orderGbp=orderTotalGbp(order);
  const orderEur=gbpToEur(orderGbp,order);
  const paymentInvoices=invoices.filter(invoice=>invoiceDocumentKind(invoice)!=="credit_note");
  const creditNotes=invoices.filter(invoice=>invoiceDocumentKind(invoice)==="credit_note");
  const grossInvoiceGbp=paymentInvoices.reduce((total,invoice)=>total+invoiceAmountGbp(invoice,order),0);
  const grossInvoiceEur=paymentInvoices.reduce((total,invoice)=>total+invoiceAmountEur(invoice,order),0);
  const creditNoteGbp=creditNotes.reduce((total,invoice)=>total+invoiceAmountGbp(invoice,order),0);
  const creditNoteEur=creditNotes.reduce((total,invoice)=>total+invoiceAmountEur(invoice,order),0);
  const invoicedGbp=grossInvoiceGbp-creditNoteGbp;
  const invoicedEur=grossInvoiceEur-creditNoteEur;
  const paidInvoices=paymentInvoices.filter(invoice=>invoice.status==="Paid");
  const paidGbp=paidInvoices.reduce((total,invoice)=>total+invoiceAmountGbp(invoice,order),0);
  const paidEur=paidInvoices.reduce((total,invoice)=>total+invoiceAmountEur(invoice,order),0);
  const creditReceivedGbp=creditNotes.filter(invoice=>invoice.status==="Paid"||invoice.status==="Credit received").reduce((total,invoice)=>total+invoiceAmountGbp(invoice,order),0);
  const creditReceivedEur=creditNotes.filter(invoice=>invoice.status==="Paid"||invoice.status==="Credit received").reduce((total,invoice)=>total+invoiceAmountEur(invoice,order),0);
  const supplierCreditDueGbp=Math.max(0,creditNoteGbp-creditReceivedGbp);
  const supplierCreditDueEur=Math.max(0,creditNoteEur-creditReceivedEur);
  const toleranceGbp=invoiceBalanceToleranceGbp(order);
  const toleranceEur=gbpToEur(toleranceGbp,order);
  const varianceIgnored=Boolean(order?.invoices?.varianceIgnored);
  const outstandingInvoicedGbp=Math.max(0,invoicedGbp-paidGbp);
  const outstandingInvoicedEur=Math.max(0,invoicedEur-paidEur);
  const uninvoicedBalanceGbp=varianceIgnored?0:balanceAfterTolerance(Math.max(0,orderGbp-invoicedGbp),toleranceGbp);
  const uninvoicedBalanceEur=varianceIgnored?0:balanceAfterTolerance(Math.max(0,orderEur-invoicedEur),toleranceEur);
  const outstandingGbp=outstandingInvoicedGbp+uninvoicedBalanceGbp;
  const outstandingEur=outstandingInvoicedEur+uninvoicedBalanceEur;
  const invoiceVarianceGbp=invoicedGbp-orderGbp;
  const invoiceVarianceEur=invoicedEur-orderEur;
  return {orderGbp,orderEur,grossInvoiceGbp,grossInvoiceEur,creditNoteGbp,creditNoteEur,creditReceivedGbp,creditReceivedEur,supplierCreditDueGbp,supplierCreditDueEur,invoicedGbp,invoicedEur,paidGbp,paidEur,outstandingInvoicedGbp,outstandingInvoicedEur,uninvoicedBalanceGbp,uninvoicedBalanceEur,outstandingGbp,outstandingEur,invoiceVarianceGbp,invoiceVarianceEur,varianceIgnored};
}

  const code=String(invoice.currency||"GBP").toUpperCase();
  const signedAmount=Number(invoice.amount||0)*invoiceSign(invoice);
  const equivalent=code==="EUR"?money.format(signedInvoiceAmountGbp(invoice,order)):eurMoney.format(signedInvoiceAmountEur(invoice,order));
  const canManagePayment=canManageInvoicePayment();
  const deleteButton=canDeleteInvoice()?`<button type="button" class="mini-btn danger" onclick="deleteInvoice('${attr(invoice.id)}')">Delete</button>`:"";
  const batch=(state.batches||[]).find(item=>item.id===invoice.batchId);
  const batchLabel=batch?`<span class="money-sub">${escapeHtml(batchDisplayName(batch))}</span>`:"";
  const creditLabel=invoiceDocumentKind(invoice)==="credit_note"?`<span class="money-sub">Credit note</span>`:"";
  return `<tr>
    <td><strong title="${attr(invoice.invoiceType||"")}">${escapeHtml(invoice.invoiceNumber||invoice.invoiceType||"Invoice")}</strong>${creditLabel}${batchLabel}<div class="invoice-row-actions"><button type="button" class="mini-btn" onclick="editInvoice('${attr(invoice.id)}')">Edit</button>${deleteButton}</div></td>
    <td>${fileLink}</td>
    <td class="num">${formatCurrency(signedAmount,code)}<span class="money-sub">${equivalent}</span></td>
    <td>${formatDate(invoice.dueDate)||"-"}</td>
    <td><span class="badge ${badgeClass(invoice.status)}">${escapeHtml(invoice.status||"Awaiting FD")}</span></td>
    <td><input type="checkbox" ${invoice.isReceived?"checked":""} onchange="toggleInvoice('${attr(invoice.id)}','isReceived',this.checked)" aria-label="Received"></td>
    <td><input type="checkbox" ${invoice.sentToFd?"checked":""} ${canManagePayment?"":"disabled"} onchange="toggleInvoice('${attr(invoice.id)}','sentToFd',this.checked)" aria-label="Sent to FD"></td>
    <td><input type="checkbox" ${invoice.status==="Paid"?"checked":""} ${canManagePayment?"":"disabled"} onchange="toggleInvoice('${attr(invoice.id)}','paid',this.checked)" aria-label="Paid"></td>
  </tr>`;
}

function orderActionButtons(order){
  const archiveButton=canArchiveOrders()&&order.archivedAt
    ? `<button type="button" class="btn" onclick="setArchiveSelected(false)">Restore</button>`
    : canArchiveOrders()&&order.canArchive?`<button type="button" class="btn" onclick="setArchiveSelected(true)">Archive</button>`:"";
  const deleteButton=canDeleteOrders()&&order.canDelete?`<button type="button" class="btn" onclick="deleteSelectedOrder()">Delete</button>`:"";
  return `${archiveButton}${deleteButton}`;

function suggestedNextAction(workflow,order){
  const approval=workflow?.approvalStatus||"Not requested";
  const payment=workflow?.paymentStatus||"Not due";
  const intake=workflow?.intakeStatus||"Not confirmed";
  const supplierCreditDue=Number(order?.supplierCredit?.creditDueGbp||0);
  if(String(order?.status||"").toLowerCase()==="cancelled")return {owner:"Buyer",action:"Review cancelled order"};
  if(approval==="Pending director approval")return {owner:"Buying Director",action:"Review order for approval"};
  if(approval==="Changes requested")return {owner:"Buyer",action:"Update order and resubmit"};
  if(approval==="Rejected")return {owner:"Buyer",action:"Review rejected order"};
  if(approval!=="Approved")return {owner:"Buyer",action:"Prepare or submit order"};
  if(supplierCreditDue>0&&["Awaiting invoice","Ready to pay","Part paid","Overdue"].includes(payment))return {owner:"FD / Finance",action:"Apply supplier credit to next invoice"};
  if(payment==="Awaiting invoice")return {owner:"Buyer",action:"Awaiting supplier invoice"};
  if(payment==="Ready to pay")return {owner:"FD / Finance",action:"Pay supplier invoice"};
  if(payment==="Part paid")return {owner:"Buyer",action:"Awaiting next supplier invoice"};
  if(payment==="Overdue")return {owner:"FD / Finance",action:"Resolve overdue supplier payment"};
  if(payment!=="Paid")return {owner:"Buyer",action:"Confirm invoice and payment plan"};
  if((state.discrepancies||[]).some(item=>item.status==="Credit requested"))return {owner:"FD / Finance",action:"Track supplier credit note"};
  if((state.discrepancies||[]).some(item=>!["Credit received","Replacement received","Accepted variance","Written off","Resolved"].includes(item.status)))return {owner:"Merchandising",action:"Resolve receipt discrepancy"};
  if(intake==="Not confirmed"&&!productCompletion(order).complete)return {owner:"Buyer",action:"Complete Shopify product sync before warehouse booking"};
  if(intake===deliveryReviewStatus)return {owner:"Merchandising",action:"Review delivery before archive"};
  if(intake==="Received")return {owner:"Merchandising",action:"Archive completed order"};
  if(intake==="Part received")return {owner:"Merchandising",action:"Chase remaining intake"};
  if(intake==="Shipped")return {owner:"Merchandising",action:"Track shipment to warehouse"};
  if(intake==="Part shipped")return {owner:"Merchandising",action:"Track remaining supplier shipments"};
  if(intake==="Delayed")return {owner:"Merchandising",action:"Resolve delayed intake"};
  if(intake==="In production")return {owner:"Merchandising",action:"Track supplier production and ETA"};
  if(intake==="Confirmed")return {owner:"Merchandising",action:"Track confirmed intake date"};
  return {owner:"Merchandising",action:"Track intake date"};
}

function workflowFromControls(){
  const current=state.selected?.workflow||{};
  const approvalStatus=val("approval-status")||current.approvalStatus;
  const currentPayment=val("payment-status")||current.paymentStatus;
  const paymentStatus=approvalStatus==="Approved"&&currentPayment==="Not due"?"Awaiting invoice":currentPayment;
  return {
    ...current,
    approvalStatus,
    paymentStatus,
    intakeStatus:val("intake-status")||current.intakeStatus
  };
}

function syncNextActionFromStatuses(){
  if(val("approval-status")==="Approved"&&val("payment-status")==="Not due")setVal("payment-status","Awaiting invoice");
  const suggestion=suggestedNextAction(workflowFromControls(),state.selected);
  setVal("next-owner",suggestion.owner);
  setVal("next-action",suggestion.action);
}

function today(){

async function saveWorkflow(section,patch){
  if(!state.selectedId)return;
  localStorage.setItem("ordersActorName",val("actor-name"));
  const response=await apiFetch("/api/orders/workflow",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId,section,actorName:val("actor-name"),patch})});
  const result=await response.json();
  if(!response.ok||!result.ok)throw new Error(result.error||"Could not save workflow");
  state.selected=result.order;
  state.events=result.events||[];
  state.invoices=result.invoices||state.invoices||[];
  state.batches=result.batches||state.batches||[];
  state.batchLines=result.batchLines||state.batchLines||[];
  state.receiptLines=result.receiptLines||state.receiptLines||[];
  state.discrepancies=result.discrepancies||state.discrepancies||[];
  const index=state.orders.findIndex(order=>order.id===result.order.id);
  if(index!==-1)state.orders[index]=result.order;
  recalcMetrics();
  renderFilters();
  renderMetrics();
  renderOrders();
  renderDetail();
}

async function saveNextAction(){

async function checkOrderProductsInShopify(){
  if(!state.selectedId)return;
  try{
    showStatus("Checking Shopify SKUs...","ok");
    const response=await apiFetch("/api/orders/products/shopify-status",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId})});
    const result=await response.json();
    if(!response.ok)throw new Error(result.error||"Could not check Shopify SKUs");
    state.selected=result.order;
    state.events=result.events||state.events||[];
    state.invoices=result.invoices||state.invoices||[];
    state.batches=result.batches||state.batches||[];
    state.batchLines=result.batchLines||state.batchLines||[];
    state.receiptLines=result.receiptLines||state.receiptLines||[];
    state.discrepancies=result.discrepancies||state.discrepancies||[];
    const index=state.orders.findIndex(order=>order.id===result.order.id);
    if(index!==-1)state.orders[index]=result.order;
    recalcMetrics();
    renderFilters();
    renderMetrics();
    renderOrders();
    renderDetail();
    const linked=(result.results||[]).filter(item=>item.ok&&!item.skipped).length;
    const outstanding=Number(result.after?.blockedLines||0);
    showStatus(outstanding?`Checked Shopify. ${outstanding} SKU${outstanding===1?"":"s"} still need attention.`:`Checked Shopify. ${linked} SKU${linked===1?"":"s"} linked and the product gate is clear.`,outstanding?"warn":"ok");
  }catch(error){
    showError(error);
  }
}

async function checkLiveNewArrivals(){
  if(!state.selectedId)return;
  try{
    showStatus("Checking Shopify live/New Arrivals state...","ok");
    const response=await apiFetch(`/api/orders/products/live-new-arrivals?orderId=${encodeURIComponent(state.selectedId)}`);
    const result=await response.json();
    if(!response.ok)throw new Error(result.error||"Could not check Shopify live/New Arrivals state");
    state.liveCheck=result;
    renderDetail();
    if(result.configured===false){
      showStatus(result.message||"Shopify credentials are not configured.","warn");
      return;
    }
    const summary=result.summary||{};
    const ok=Number(summary.ok||0);
    const lines=Number(summary.lines||0);
    const errors=Number(summary.errors||0);
    const errorText=errors?` ${errors.toLocaleString("en-GB")} error${errors===1?"":"s"}.`:"";
    showStatus(`Checked Shopify: ${ok.toLocaleString("en-GB")} of ${lines.toLocaleString("en-GB")} line${lines===1?"":"s"} are live and tagged Collection: New Arrivals.${errorText}`,ok===lines&&lines>0?"ok":"warn");
  }catch(error){
    showError(error);
  }
}

function readFileAsDataUrl(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=()=>reject(new Error("Could not read invoice file"));
    reader.readAsDataURL(file);
  });
}

async function saveInvoice(){
  if(!state.selectedId)return;
  const editing=(state.invoices||[]).find(invoice=>invoice.id===state.editingInvoiceId)||null;
  const file=el("invoice-file")?.files?.[0]||null;
  if(file&&file.size>12_000_000){
    showError(new Error("Choose an invoice under 12 MB."));
    return;
  }
  if(!file&&!editing?.fileName&&!val("invoice-number")){
    showError(new Error("Upload an invoice file or add an invoice number."));
    return;
  }
  const sentToFd=Boolean(el("invoice-sent")?.checked);
  const paid=Boolean(el("invoice-paid")?.checked);
  const fileData=file?await readFileAsDataUrl(file):"";
  await saveInvoicePayload({
    id:state.editingInvoiceId||"",
    batchId:val("invoice-batch"),
    linkedDiscrepancyId:val("invoice-discrepancy"),
    documentKind:String(val("invoice-type")).toLowerCase()==="credit note"?"credit_note":"invoice",
    invoiceType:val("invoice-type"),
    invoiceNumber:val("invoice-number"),
    invoiceDate:val("invoice-date"),
    dueDate:val("invoice-due"),
    amount:val("invoice-amount"),
    currency:val("invoice-currency")||state.selected?.currency||"GBP",
    isReceived:Boolean(el("invoice-received")?.checked)||Boolean(file),
    sentToFd,
    status:paid?"Paid":sentToFd?"Sent to FD":val("invoice-status"),
    fileName:file?.name||"",
    mimeType:file?.type||"",
    fileData,
    notes:val("invoice-notes")
  }).catch(showError);
}

async function deleteInvoice(id){
  const invoice=(state.invoices||[]).find(item=>item.id===id);
  if(!invoice)return;
  if(!window.confirm(`Delete invoice ${invoice.invoiceNumber||invoice.invoiceType||"invoice"}?`))return;

  const response=await apiFetch("/api/orders/invoices/delete",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId,actorName:val("actor-name"),invoiceId:id})});
  const result=await response.json();
  if(!response.ok||!result.ok){showError(new Error(result.error||"Could not delete invoice"));return;}
  state.selected=result.order;
  state.invoices=result.invoices||[];
  state.batches=result.batches||state.batches||[];
  state.batchLines=result.batchLines||state.batchLines||[];
  state.receiptLines=result.receiptLines||state.receiptLines||[];
  state.discrepancies=result.discrepancies||state.discrepancies||[];
  state.events=result.events||[];
  if(state.editingInvoiceId===id)state.editingInvoiceId="";
  state.invoiceEditorOpen=false;
  const index=state.orders.findIndex(order=>order.id===result.order.id);
  if(index!==-1)state.orders[index]=result.order;
  recalcMetrics();
  renderFilters();
  renderMetrics();
  renderOrders();
  renderDetail();
}

async function toggleInvoice(id,key,checked){
  const invoice=(state.invoices||[]).find(item=>item.id===id);
  if(!invoice)return;
  const patch={...invoice,[key]:checked};
  if(key==="paid"){
    patch.status=checked?"Paid":invoice.sentToFd?"Sent to FD":"Awaiting FD";
    patch.sentToFd=checked?true:invoice.sentToFd;
    patch.isReceived=checked?true:invoice.isReceived;
  }
  if(key==="sentToFd"&&checked&&patch.status==="Awaiting FD")patch.status="Sent to FD";
  if(key==="sentToFd"&&!checked&&patch.status==="Sent to FD")patch.status="Awaiting FD";
  await saveInvoicePayload(patch).catch(showError);
}

  if(!window.confirm(`Delete ${state.selected?.orderNumber||"this order"}? This cannot be undone.`))return;
  localStorage.setItem("ordersActorName",val("actor-name"));
  const response=await apiFetch("/api/orders/delete",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId,actorName:val("actor-name")})});
  const result=await response.json();
  if(!response.ok||!result.ok){showError(new Error(result.error||"Could not delete order"));return;}
  state.orders=state.orders.filter(order=>order.id!==state.selectedId);
  state.selectedId="";
  state.selected=null;
  state.events=[];
  state.invoices=[];
  state.batches=[];
  state.batchLines=[];
  state.receiptLines=[];
  state.discrepancies=[];
  recalcMetrics();
  renderFilters();
  renderMetrics();
  renderOrders();
  const next=filterOrders()[0];
  if(next)await selectOrder(next.id);
  else renderDetail();
}

function toggleCreateBatch(){
  if(state.editingBatchId){
    cancelBatchEdit();
    return;
  }
  state.batchEditorOpen=!state.batchEditorOpen;
  renderDetail();
}

function editBatch(id){
  state.editingBatchId=id;
  state.batchEditorOpen=true;
  renderDetail();
}

function cancelBatchEdit(){
  state.editingBatchId="";
  state.batchEditorOpen=false;
  renderDetail();
}

async function saveBatch(){
  if(!state.selectedId)return;
  if(!productCompletion(state.selected).complete){
    showError(new Error("Complete or sync every product to Shopify before creating supplier batches or booking warehouse intake."));
    return;
  }
  const status=val("batch-intake");
  const lines=state.selected?.order?.lines||[];
  const lineAllocations=lines.map((line,index)=>{
    const checkbox=el(allocationCheckId(index));
    const qtyNode=el(allocationInputId(index));
    const quantity=Number(qtyNode?.value||0);
    return checkbox?.checked||quantity>0?{lineIndex:index,quantity}:null;
  }).filter(Boolean);
  const hadLineAllocations=Boolean(state.editingBatchId&&(state.batchLines||[]).some(item=>item.batchId===state.editingBatchId));
  const batch={
    id:state.editingBatchId||"",
    batchNumber:val("batch-number"),
    title:val("batch-title"),
    styleCount:val("batch-styles"),
    units:val("batch-units"),
    value:val("batch-value"),
    currency:val("batch-currency")||state.selected?.currency||"GBP",
    paymentStatus:val("batch-payment"),
    intakeStatus:status,
    etaDate:val("batch-eta"),
    shippedDate:val("batch-shipped")||(status==="Shipped"?today():""),
    receivedDate:val("batch-received")||(status==="Received"?today():""),
    trackingReference:val("batch-tracking"),
    styleNotes:val("batch-styles-note"),
    notes:val("batch-notes")
  };
  if(lineAllocations.length||hadLineAllocations)batch.lineAllocations=lineAllocations;
  localStorage.setItem("ordersActorName",val("actor-name"));
  const response=await apiFetch("/api/orders/batches",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId,actorName:val("actor-name"),batch})});
  const result=await response.json();
  if(!response.ok||!result.ok){showError(new Error(result.error||"Could not save batch"));return;}
  state.selected=result.order;
  state.batches=result.batches||[];
  state.invoices=result.invoices||state.invoices||[];
  state.batchLines=result.batchLines||[];
  state.receiptLines=result.receiptLines||state.receiptLines||[];
  state.discrepancies=result.discrepancies||state.discrepancies||[];
  state.events=result.events||[];
  state.editingBatchId="";
  state.batchEditorOpen=false;
  const index=state.orders.findIndex(order=>order.id===result.order.id);
  if(index!==-1)state.orders[index]=result.order;
  recalcMetrics();
  renderFilters();
  renderMetrics();
  renderOrders();
  renderDetail();
}

async function deleteBatch(id){
  const batch=(state.batches||[]).find(item=>item.id===id);
  if(!batch)return;
  if(!window.confirm(`Delete ${batchDisplayName(batch)}? Linked invoices will stay on the order.`))return;
  localStorage.setItem("ordersActorName",val("actor-name"));
  const response=await apiFetch("/api/orders/batches/delete",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId,actorName:val("actor-name"),batchId:id})});
  const result=await response.json();
  if(!response.ok||!result.ok){showError(new Error(result.error||"Could not delete batch"));return;}
  state.selected=result.order;
  state.batches=result.batches||[];
  state.invoices=result.invoices||state.invoices||[];
  state.batchLines=result.batchLines||[];
  state.receiptLines=result.receiptLines||state.receiptLines||[];
  state.discrepancies=result.discrepancies||state.discrepancies||[];
  state.events=result.events||[];
  if(state.editingBatchId===id)state.editingBatchId="";
  if(state.lineBatchFilter===id)state.lineBatchFilter="all";
  state.batchEditorOpen=false;
  const index=state.orders.findIndex(order=>order.id===result.order.id);
  if(index!==-1)state.orders[index]=result.order;
  recalcMetrics();
  renderFilters();
  renderMetrics();
  renderOrders();
  renderDetail();
}

async function saveIntake(){
  if(!productCompletion(state.selected).complete){
    showError(new Error("Complete or sync every product to Shopify before booking warehouse intake."));
    return;
  }
  const status=val("intake-status");
  await saveWorkflow("intake",{
    intakeStatus:status,
    intakeEtaDate:val("intake-eta"),
    intakeConfirmedDate:val("intake-confirmed"),
    intakeActualDate:val("intake-actual")||([deliveryReviewStatus,"Received"].includes(status)?today():""),
    intakeReference:val("intake-ref"),
    intakeNotes:val("intake-notes")
  }).catch(showError);
}

async function addNote(){
  if(!state.selectedId||!val("activity-note"))return;
  localStorage.setItem("ordersActorName",val("actor-name"));
  const response=await apiFetch("/api/orders/events",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId,actorName:val("actor-name"),message:val("activity-note")})});
  const result=await response.json();
  if(!response.ok||!result.ok){showError(new Error(result.error||"Could not add note"));return;}
  state.events=result.events||[];
  el("activity-note").value="";
  renderDetail();
}

function showError(error){
  showStatus(error.message,"err");
}

function showStatus(message,type="ok"){
  el("detail").insertAdjacentHTML("afterbegin",`<div class="status ${type}" style="margin-bottom:10px">${escapeHtml(message)}</div>`);
}

async function selectOrder(id){
  state.liveCheck=null;
  state.selectedId=id;
  state.editingInvoiceId="";
  state.invoiceEditorOpen=false;
  state.editingBatchId="";
  state.batchEditorOpen=false;
  state.receivingBatchId="";
  state.labelValidation=null;
  renderOrders();
  el("detail").innerHTML=`<section class="panel"><p class="empty-state">Loading order...</p></section>`;
  const response=await apiFetch(`/api/orders/detail?id=${encodeURIComponent(id)}`);
  const result=await response.json();
  if(!response.ok){throw new Error(result.error||"Could not load order");}
  state.selected=result.order;
  state.events=result.events||[];
  state.invoices=result.invoices||[];
  state.batches=result.batches||[];
  state.batchLines=result.batchLines||[];
  state.receiptLines=result.receiptLines||[];
  state.discrepancies=result.discrepancies||[];
  state.labelJobs=result.labelJobs||[];
  state.pahSettings=result.pahSettings||state.pahSettings||{};
  const index=state.orders.findIndex(order=>order.id===id);
  if(index!==-1)state.orders[index]=result.order;
  renderOrders();
  renderDetail();
}

async function loadWorkspace(){
  el("detail").innerHTML=`<section class="panel"><p class="empty-state">Loading orders...</p></section>`;
  const response=await apiFetch("/api/orders/workspace");
  const data=await response.json();
  state.orders=data.orders||[];
  state.metrics=data.metrics||{};
  state.users=data.users||[];
  state.authMode=data.authMode||state.authMode;
  state.currentUser=data.currentUser||state.currentUser;
  recalcMetrics();
  renderMetrics();
  renderFilters();
  renderOrders();
  if(state.orders.length){
    const firstVisible=filterOrders()[0];
    await selectOrder(state.selectedId&&state.orders.some(order=>order.id===state.selectedId)?state.selectedId:(firstVisible||state.orders[0]).id);
  }else{
    renderDetail();
  }
}

["search","sort-filter","archive-filter","status-filter","owner-filter","role-filter"].forEach(id=>el(id).addEventListener("input",()=>{renderFilters();renderOrders();}));
el("refresh-btn").addEventListener("click",()=>loadWorkspace().catch(showError));
loadWorkspace().catch(error=>{
  renderMetrics();
  el("order-list").innerHTML="";
  el("detail").innerHTML=`<section class="panel"><p class="empty-state">${escapeHtml(error.message)}</p></section>`;
});
</script>
</body>
</html>
