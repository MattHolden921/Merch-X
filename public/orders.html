<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders</title>
<link rel="stylesheet" href="design-system.css">
<style>
.wrap{max-width:1560px}
.head{align-items:center}
.status-pill{white-space:nowrap}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.toolbar{display:grid;grid-template-columns:minmax(220px,1fr) 160px 170px 160px 150px;gap:10px;align-items:end}
.toolbar .field{margin-bottom:0}
.filter-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:8px;margin-top:12px}
.filter-summary .summary-item strong{font-size:14px}
.filter-context{grid-column:span 2}
.filter-context strong{white-space:normal;line-height:1.35}
.layout{display:grid;grid-template-columns:430px minmax(0,1fr);gap:14px;align-items:start}
.layout>*{min-width:0}
.order-list{display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 284px);overflow:auto;padding-right:2px}
.order-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;width:100%;border:1px solid var(--ds-line);border-radius:var(--ds-radius);background:var(--ds-bg-surface);padding:10px;text-align:left;cursor:pointer}
.order-row:hover,.order-row.active{border-color:var(--ds-action);background:var(--ds-bg-muted)}
.order-main{min-width:0}
.order-main strong{display:block;font-size:13px;margin-bottom:3px}
.order-main span,.order-side span{display:block;font-size:11px;color:var(--ds-text-muted);line-height:1.5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.order-side{text-align:right;min-width:112px}
.badge{display:inline-flex;align-items:center;min-height:20px;border:1px solid var(--ds-line);border-radius:var(--ds-radius);padding:2px 7px;font-size:10px;font-weight:650;color:var(--ds-text-muted);background:var(--ds-bg-muted);white-space:nowrap}
.badge.good{color:var(--ds-good);border-color:rgba(21,128,61,.35)}
.badge.warn{color:var(--ds-warn);border-color:rgba(180,83,9,.35)}
.badge.bad{color:var(--ds-bad);border-color:rgba(185,28,28,.35)}
.badge.info{color:var(--ds-info);border-color:rgba(37,99,235,.35)}
.detail-head{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:start;margin-bottom:14px}
.detail-title h2{font-size:20px;font-weight:650;margin-bottom:4px}
.detail-title p{font-size:12px;color:var(--ds-text-muted);line-height:1.55}
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.summary-item{border:1px solid var(--ds-line);border-radius:var(--ds-radius);background:var(--ds-bg-muted);padding:9px 10px;min-width:0}
.summary-item label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ds-text-soft);margin-bottom:4px}
.summary-item strong{display:block;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.workflow-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.work-panel{min-width:0;border:1px solid var(--ds-line);border-radius:var(--ds-radius);background:var(--ds-bg-surface);padding:12px}
.work-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.work-head h3{font-size:13px;font-weight:650}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field{min-width:0;margin-bottom:10px}
.field:last-child{margin-bottom:0}
textarea{min-height:70px;resize:vertical}
.activity{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow:auto}
.event{border-top:1px solid var(--ds-line);padding-top:8px;font-size:12px;color:var(--ds-text-muted);line-height:1.5}
.event:first-child{border-top:0;padding-top:0}
.event strong{display:block;color:var(--ds-text);font-size:12px}
.invoice-group{border-top:1px solid var(--ds-line);margin-top:12px;padding-top:12px}
.invoice-create{display:none;border:1px solid var(--ds-line);border-radius:var(--ds-radius);background:var(--ds-bg-muted);padding:10px;margin-bottom:12px}
.invoice-create.open{display:block}
.invoice-form{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-items:end}
.invoice-totals{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.invoice-total{border:1px solid var(--ds-line);border-radius:var(--ds-radius);background:var(--ds-bg-muted);padding:8px 9px}
.invoice-total label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ds-text-soft);margin-bottom:3px}
.invoice-total strong{font-size:14px}
.money-sub{display:block;margin-top:2px;font-size:10px;color:var(--ds-text-soft);font-weight:500}
.invoice-table-wrap{overflow:auto;border:1px solid var(--ds-line);border-radius:var(--ds-radius);background:var(--ds-bg-surface)}
.invoice-table{width:100%;border-collapse:collapse;table-layout:fixed}
.invoice-table th{font-size:9px;text-transform:uppercase;letter-spacing:0;color:var(--ds-text-soft);text-align:left;background:var(--ds-bg-muted);padding:6px 4px;border-bottom:1px solid var(--ds-line)}
.invoice-table td{font-size:11px;color:var(--ds-text-muted);padding:6px 4px;border-bottom:1px solid var(--ds-line);vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
.invoice-table tr:last-child td{border-bottom:0}
.invoice-table a{font-weight:600}
.invoice-table input[type="checkbox"]{width:16px;min-height:16px}
.invoice-table th:nth-child(1),.invoice-table td:nth-child(1){width:24%}
.invoice-table th:nth-child(2),.invoice-table td:nth-child(2){width:30px;text-align:center}
.invoice-table th:nth-child(3),.invoice-table td:nth-child(3){width:92px}
.invoice-table th:nth-child(4),.invoice-table td:nth-child(4){width:52px}
.invoice-table th:nth-child(5),.invoice-table td:nth-child(5){width:68px}
.invoice-table th:nth-child(6),.invoice-table td:nth-child(6),.invoice-table th:nth-child(7),.invoice-table td:nth-child(7),.invoice-table th:nth-child(8),.invoice-table td:nth-child(8){width:34px;text-align:center}
.invoice-table .badge{font-size:9px;padding:2px 4px;max-width:60px;overflow:hidden;text-overflow:ellipsis}
.invoice-row-actions{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.mini-btn{border:1px solid var(--ds-line-strong);border-radius:var(--ds-radius);background:var(--ds-bg-surface);color:var(--ds-text-muted);font-size:10px;line-height:1;padding:4px 5px;cursor:pointer}
.mini-btn:hover{color:var(--ds-text);background:var(--ds-bg-muted)}
.mini-btn.danger{color:var(--ds-bad)}
.file-icon{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:1px solid var(--ds-line-strong);border-radius:var(--ds-radius);background:var(--ds-bg-muted);text-decoration:none;position:relative}
.file-icon::before{content:"";width:10px;height:13px;border:1.5px solid currentColor;border-radius:1px;background:transparent}
.file-icon::after{content:"";position:absolute;top:6px;right:7px;width:4px;height:4px;border-top:1.5px solid currentColor;border-right:1.5px solid currentColor;background:var(--ds-bg-muted)}
.file-icon.empty{opacity:.35;pointer-events:none}
.invoice-checks{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--ds-text-muted)}
.invoice-checks label{display:inline-flex;align-items:center;gap:6px}
.invoice-checks input{width:auto;min-height:0}
.file-input{padding:6px 8px;min-height:34px}
.empty-state{padding:38px 16px;text-align:center;color:var(--ds-text-muted);font-size:13px;line-height:1.6}
.line-table-wrap{overflow:auto;border:1px solid var(--ds-line);border-radius:var(--ds-radius)}
.line-table{width:100%;border-collapse:collapse;min-width:1040px}
.line-table th{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ds-text-soft);text-align:left;background:var(--ds-bg-muted);padding:8px;border-bottom:1px solid var(--ds-line)}
.line-table td{font-size:12px;color:var(--ds-text-muted);padding:8px;border-bottom:1px solid var(--ds-line);vertical-align:top}
.line-table tr:last-child td{border-bottom:0}
.num{text-align:right;white-space:nowrap}
@media(max-width:1180px){.layout{grid-template-columns:1fr}.order-list{max-height:none}.metric-grid,.summary-grid{grid-template-columns:repeat(2,1fr)}.filter-summary{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.toolbar,.workflow-grid,.grid2,.grid3,.invoice-form,.invoice-totals{grid-template-columns:1fr}.metric-grid,.summary-grid,.filter-summary{grid-template-columns:1fr}.filter-context{grid-column:auto}.detail-head{grid-template-columns:1fr}.actions{justify-content:flex-start}.order-row{grid-template-columns:1fr}.order-side{text-align:left;display:flex;gap:6px;flex-wrap:wrap;min-width:0}.order-side span{display:inline-flex;width:auto}.badge{max-width:100%}}
</style>
</head>
<body>
<main class="wrap">
  <a class="home" href="/">Home</a>
  <section class="head">
    <div>
      <h1>Orders</h1>
      <p class="sub">Manage purchase order approval, payment, and intake from the saved stock order forms.</p>
    </div>
    <div class="actions">
      <a class="btn" href="order-form.html">New order</a>
      <button type="button" class="btn primary" id="refresh-btn">Refresh</button>
    </div>
  </section>

  <section class="metric-grid" id="metrics"></section>

  <section class="panel">
    <div class="toolbar">
      <div class="field"><label>Search</label><input id="search" placeholder="Order, supplier, buyer, SKU"></div>
      <div class="field"><label>View</label><select class="select" id="archive-filter"><option value="active">Active</option><option value="archived">Archived</option><option value="all">All</option></select></div>
      <div class="field"><label>Status</label><select class="select" id="status-filter"></select></div>
      <div class="field"><label>Owner</label><select class="select" id="owner-filter"></select></div>
      <div class="field"><label>Viewing as</label><select class="select" id="role-filter"><option value="">All departments</option><option>Buyer</option><option>Buying Director</option><option>FD / Finance</option><option>Merchandising</option></select></div>
    </div>
    <div class="filter-summary" id="filter-summary"></div>
  </section>

  <section class="layout">
    <aside class="panel">
      <div class="section-head">
        <p class="section-title">Order list</p>
        <span class="pill" id="order-count">0 orders</span>
      </div>
      <div class="order-list" id="order-list"></div>
    </aside>

    <section id="detail"></section>
  </section>
</main>

<script>
const money=new Intl.NumberFormat("en-GB",{style:"currency",currency:"GBP"});
const eurMoney=new Intl.NumberFormat("en-GB",{style:"currency",currency:"EUR"});
const dateFmt=new Intl.DateTimeFormat("en-GB",{day:"2-digit",month:"short",year:"numeric"});
const API_ORIGINS=location.protocol==="file:"?["http://localhost:3003","http://localhost:3001","http://localhost:3000"]:[""];
const approvalStatuses=["Not requested","Pending director approval","Approved","Changes requested","Rejected"];
const paymentStatuses=["Not due","Awaiting invoice","Ready to pay","Part paid","Paid","Overdue"];
const intakeStatuses=["Not confirmed","Confirmed","In production","Shipped","Delayed","Part received","Received"];
const invoiceTypes=["Deposit invoice","Balance invoice","Full invoice","Credit note","Other"];
const invoiceStatuses=["Awaiting FD","Sent to FD","Paid","Query"];
const currencyOptions=["EUR","GBP","USD","Other"];
const owners=["Buyer","Buying Director","FD / Finance","Merchandising","Supplier"];
let state={orders:[],selectedId:new URLSearchParams(location.search).get("id")||"",selected:null,events:[],invoices:[],metrics:null,users:[],editingInvoiceId:"",invoiceEditorOpen:false};

const el=id=>document.getElementById(id);
const val=id=>el(id)?.value?.trim()||"";
const setVal=(id,value)=>{const node=el(id);if(node)node.value=value||"";};

async function apiFetch(path,options){
  let lastError;
  for(const origin of API_ORIGINS){
    try{
      const response=await fetch(`${origin}${path}`,options);
      if(response.ok||response.status>=400)return response;
      lastError=new Error(`API returned ${response.status}`);
    }catch(error){
      lastError=error;
    }
  }
  throw lastError||new Error("API unavailable");
}

function escapeHtml(value){
  return String(value||"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
}

function attr(value){
  return escapeHtml(value).replaceAll("`","&#96;");
}

function formatDate(value){
  if(!value)return "";
  const date=new Date(`${value}T00:00:00`);
  return Number.isNaN(date.getTime())?value:dateFmt.format(date);
}

function formatCurrency(value,currency){
  const code=String(currency||"GBP").toUpperCase();
  if(code==="GBP")return money.format(Number(value||0));
  if(code==="EUR")return eurMoney.format(Number(value||0));
  try{
    return new Intl.NumberFormat("en-GB",{style:"currency",currency:code}).format(Number(value||0));
  }catch(error){
    return `${Number(value||0).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2})} ${code}`;
  }
}

function orderFxRate(order){
  return Number(order?.fxRate||order?.order?.fxRate||order?.order?.totals?.fxRate||0);
}

function orderTotalGbp(order){
  return Number(order?.totalGbp||order?.total||order?.order?.totals?.grand||0);
}

function gbpToEur(value,order){
  const rate=orderFxRate(order);
  return rate?Number(value||0)/rate:0;
}

function eurToGbp(value,order){
  const rate=orderFxRate(order);
  return rate?Number(value||0)*rate:Number(value||0);
}

function moneyPairFromGbp(value,order){
  const gbp=Number(value||0);
  const eur=gbpToEur(gbp,order);
  return orderFxRate(order)?`${money.format(gbp)} / ${eurMoney.format(eur)}`:`${money.format(gbp)} / EUR n/a`;
}

function invoiceAmountGbp(invoice,order){
  const amount=Number(invoice?.amount||0);
  return String(invoice?.currency||"GBP").toUpperCase()==="EUR"?eurToGbp(amount,order):amount;
}

function invoiceAmountEur(invoice,order){
  const amount=Number(invoice?.amount||0);
  return String(invoice?.currency||"GBP").toUpperCase()==="EUR"?amount:gbpToEur(amount,order);
}

function invoiceDefaultAmount(order,currency){
  const code=String(currency||order?.currency||"GBP").toUpperCase();
  return code==="EUR"&&orderFxRate(order)?gbpToEur(orderTotalGbp(order),order):orderTotalGbp(order);
}

function lineUnitGbp(line){
  return Number(line?.unitCostGbp||line?.unitCost||0);
}

function lineUnitEur(line,order){
  const eur=Number(line?.unitCostEur||0);
  return eur||gbpToEur(lineUnitGbp(line),order);
}

function lineCostGbp(line){
  return Number(line?.lineCost||0);
}

function lineCostEur(line,order){
  const qty=Number(line?.quantity||0);
  const eur=lineUnitEur(line,order);
  return eur?eur*qty:gbpToEur(lineCostGbp(line),order);
}

function options(items,value,blank){
  return `${blank?`<option value="">${escapeHtml(blank)}</option>`:""}${items.map(item=>`<option${item===value?" selected":""}>${escapeHtml(item)}</option>`).join("")}`;
}

function userOptions(value,blank="Unassigned"){
  return `${blank?`<option value="">${escapeHtml(blank)}</option>`:""}${(state.users||[]).map(user=>`<option value="${attr(user.id)}"${user.id===value?" selected":""}>${escapeHtml(user.displayName||user.email)}</option>`).join("")}`;
}

function badgeClass(value){
  if(["Approved","Paid","Received","Payment complete"].includes(value))return"good";
  if(["Pending director approval","Ready to pay","Part paid","Shipped","Confirmed","In production","Awaiting approval","Sent to FD"].includes(value))return"info";
  if(["Changes requested","Awaiting invoice","Delayed","Overdue","Rejected","Query"].includes(value))return value==="Overdue"||value==="Rejected"?"bad":"warn";
  return "";
}

function metric(label,value,small){
  return `<div class="metric"><label>${escapeHtml(label)}</label><span>${escapeHtml(value)}</span><small>${escapeHtml(small)}</small></div>`;
}

function renderMetrics(){
  const m=state.metrics||{totalOrders:0,awaitingApproval:0,readyToPay:0,intakeRisk:0};
  el("metrics").innerHTML=[
    metric("Orders",m.totalOrders,"saved purchase orders"),
    metric("Approval",m.awaitingApproval,"awaiting director"),
    metric("Payment",m.readyToPay,"ready, part-paid, or overdue"),
    metric("Intake risk",m.intakeRisk,"delayed or past ETA")
  ].join("");
}

function recalcMetrics(){
  const todayIso=new Date().toISOString().slice(0,10);
  const activeOrders=state.orders.filter(order=>!order.archivedAt);
  state.metrics={
    totalOrders:activeOrders.length,
    awaitingApproval:activeOrders.filter(order=>order.workflow.approvalStatus==="Pending director approval").length,
    readyToPay:activeOrders.filter(order=>["Ready to pay","Overdue","Part paid"].includes(order.workflow.paymentStatus)).length,
    intakeRisk:activeOrders.filter(order=>order.workflow.intakeStatus==="Delayed"||(order.workflow.intakeEtaDate&&order.workflow.intakeEtaDate<todayIso&&order.workflow.intakeStatus!=="Received")).length
  };
}

function filterOrders(){
  const search=val("search").toLowerCase();
  const status=val("status-filter");
  const owner=val("owner-filter");
  const role=val("role-filter");
  const archiveMode=val("archive-filter")||"active";
  return state.orders.filter(order=>{
    if(archiveMode==="active"&&order.archivedAt)return false;
    if(archiveMode==="archived"&&!order.archivedAt)return false;
    const haystack=[
      order.orderNumber,order.supplierName,order.buyerName,order.buyerEmail,order.compositeStatus,
      ...(order.categories||[]),...(order.order?.lines||[]).flatMap(line=>[line.sku,line.style,line.buyingCode])
    ].join(" ").toLowerCase();
    return (!search||haystack.includes(search))
      &&(!status||order.compositeStatus===status)
      &&(!owner||order.workflow.nextActionOwner===owner)
      &&(!role||order.workflow.nextActionOwner===role);
  });
}

function filteredSummary(orders){
  const styles=new Set();
  const summary=orders.reduce((total,order)=>{
    const lines=order.order?.lines||[];
    total.orders+=1;
    total.units+=Number(order.units||0);
    total.cost+=orderTotalGbp(order);
    total.costEur+=gbpToEur(orderTotalGbp(order),order);
    total.retail+=Number(order.order?.totals?.totalRrp||lines.reduce((sum,line)=>sum+Number(line.lineRrp||0),0));
    lines.forEach(line=>{
      const style=String(line.style||line.description||line.sku||"").trim().toLowerCase();
      if(style)styles.add(style);
    });
    return total;
  },{orders:0,units:0,cost:0,costEur:0,retail:0});
  summary.styles=styles.size;
  return summary;
}

function financeSummary(orders){
  return orders.reduce((total,order)=>{
    const invoices=order.invoices||{};
    const orderValue=orderTotalGbp(order);
    total.orders+=1;
    total.orderValue+=orderValue;
    total.orderValueEur+=Number(invoices.orderTotalEur||gbpToEur(orderValue,order));
    total.invoices+=Number(invoices.count||0);
    total.invoiced+=Number(invoices.totalDue||0);
    total.invoicedEur+=Number(invoices.totalDueEur||gbpToEur(invoices.totalDue||0,order));
    total.paid+=Number(invoices.totalPaid||0);
    total.paidEur+=Number(invoices.totalPaidEur||gbpToEur(invoices.totalPaid||0,order));
    total.awaitingPayment+=Number(invoices.outstanding||0);
    total.awaitingPaymentEur+=Number(invoices.outstandingEur||gbpToEur(invoices.outstanding||0,order));
    return total;
  },{orders:0,orderValue:0,orderValueEur:0,invoices:0,invoiced:0,invoicedEur:0,paid:0,paidEur:0,awaitingPayment:0,awaitingPaymentEur:0});
}

function showingFinanceSummary(){
  return val("role-filter")==="FD / Finance"||(!val("role-filter")&&val("owner-filter")==="FD / Finance");
}

function filterContextText(){
  const parts=[];
  const role=val("role-filter");
  const owner=val("owner-filter");
  const status=val("status-filter");
  const search=val("search");
  const archiveMode=val("archive-filter")||"active";
  if(role)parts.push(role);
  else if(owner)parts.push(owner);
  if(status)parts.push(status);
  if(search)parts.push(`Search: ${search}`);
  if(archiveMode==="archived")parts.push("Archived");
  if(archiveMode==="all")parts.push("All orders");
  return parts.length?parts.join(" / "):"Current filtered orders";
}

function renderFilterSummary(orders){
  const summary=filteredSummary(orders);
  if(showingFinanceSummary()){
    const finance=financeSummary(orders);
    el("filter-summary").innerHTML=[
      `<div class="summary-item filter-context"><label>Summary</label><strong>${escapeHtml(filterContextText())}</strong></div>`,
      summaryItem("Orders",`${finance.orders.toLocaleString("en-GB")} order${finance.orders===1?"":"s"}`),
      summaryItem("Invoices",finance.invoices.toLocaleString("en-GB")),
      summaryItem("Invoiced",`${money.format(finance.invoiced)} / ${eurMoney.format(finance.invoicedEur)}`),
      summaryItem("Paid",`${money.format(finance.paid)} / ${eurMoney.format(finance.paidEur)}`),
      summaryItem("Awaiting payment",`${money.format(finance.awaitingPayment)} / ${eurMoney.format(finance.awaitingPaymentEur)}`),
      summaryItem("Order value",`${money.format(finance.orderValue)} / ${eurMoney.format(finance.orderValueEur)}`)
    ].join("");
    return;
  }
  el("filter-summary").innerHTML=[
    `<div class="summary-item filter-context"><label>Summary</label><strong>${escapeHtml(filterContextText())}</strong></div>`,
    summaryItem("Orders",`${summary.orders.toLocaleString("en-GB")} order${summary.orders===1?"":"s"}`),
    summaryItem("Units",summary.units.toLocaleString("en-GB")),
    summaryItem("Styles",summary.styles.toLocaleString("en-GB")),
    summaryItem("Cost inc VAT",`${money.format(summary.cost)} / ${eurMoney.format(summary.costEur)}`),
    summaryItem("Retail",money.format(summary.retail))
  ].join("");
}

function renderFilters(){
  const archiveMode=val("archive-filter")||"active";
  const scoped=state.orders.filter(order=>archiveMode==="all"||(archiveMode==="archived"?order.archivedAt:!order.archivedAt));
  const statuses=[...new Set(scoped.map(order=>order.compositeStatus).filter(Boolean))].sort();

function exportOrderLinesExcel(){
  const order=state.selected;
  const lines=order?.order?.lines||[];
  if(!order||!lines.length)return;
  const headers=["Order number","Supplier","SKU","Buying code","Style","Category","Colour","Size","Quantity","Unit cost GBP","Unit cost EUR","Line cost GBP","Line cost EUR","Season"];
  const rows=lines.map(line=>[
    order.orderNumber,
    order.supplierName,
    line.sku||"",
    line.buyingCode||line.supplierSku||"",
    line.style||line.description||"",
    line.category||"",
    line.colour||line.color||"",
    line.size||"",
    Number(line.quantity||0),
    lineUnitGbp(line).toFixed(2),
    lineUnitEur(line,order).toFixed(2),
    lineCostGbp(line).toFixed(2),
    lineCostEur(line,order).toFixed(2),
    line.season||""
  ]);
  const table=`<table><thead><tr>${headers.map(header=>`<th>${escapeHtml(header)}</th>`).join("")}</tr></thead><tbody>${rows.map(row=>`<tr>${row.map(cell=>`<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>${table}</body></html>`;
  const blob=new Blob([html],{type:"application/vnd.ms-excel"});
  const url=URL.createObjectURL(blob);
  const link=document.createElement("a");
  link.href=url;
  link.download=`${(order.orderNumber||"order").replace(/[^a-z0-9-]+/gi,"-")}-lines.xls`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function invoiceTotals(order,invoices){
  const orderGbp=orderTotalGbp(order);
  const orderEur=gbpToEur(orderGbp,order);
  const invoicedGbp=invoices.reduce((total,invoice)=>total+invoiceAmountGbp(invoice,order),0);
  const invoicedEur=invoices.reduce((total,invoice)=>total+invoiceAmountEur(invoice,order),0);
  const paidInvoices=invoices.filter(invoice=>invoice.status==="Paid");
  const paidGbp=paidInvoices.reduce((total,invoice)=>total+invoiceAmountGbp(invoice,order),0);
  const paidEur=paidInvoices.reduce((total,invoice)=>total+invoiceAmountEur(invoice,order),0);
  const outstandingGbp=Math.max(0,orderGbp-paidGbp);
  const outstandingEur=Math.max(0,orderEur-paidEur);
  return {orderGbp,orderEur,invoicedGbp,invoicedEur,paidGbp,paidEur,outstandingGbp,outstandingEur};
}

function suggestedNextAction(workflow,order){
  const approval=workflow?.approvalStatus||"Not requested";
  const payment=workflow?.paymentStatus||"Not due";
  const intake=workflow?.intakeStatus||"Not confirmed";
  if(String(order?.status||"").toLowerCase()==="cancelled")return {owner:"Buyer",action:"Review cancelled order"};
  if(approval==="Pending director approval")return {owner:"Buying Director",action:"Review order for approval"};
  if(approval==="Changes requested")return {owner:"Buyer",action:"Update order and resubmit"};
  if(approval==="Rejected")return {owner:"Buyer",action:"Review rejected order"};
  if(approval!=="Approved")return {owner:"Buyer",action:"Prepare or submit order"};
  if(payment==="Awaiting invoice")return {owner:"Buyer",action:"Awaiting supplier invoice"};
  if(payment==="Ready to pay")return {owner:"FD / Finance",action:"Pay supplier invoice"};
  if(payment==="Part paid")return {owner:"FD / Finance",action:"Pay remaining supplier invoice"};
  if(payment==="Overdue")return {owner:"FD / Finance",action:"Resolve overdue supplier payment"};
  if(payment!=="Paid")return {owner:"Buyer",action:"Confirm invoice and payment plan"};
  if(intake==="Received")return {owner:"Merchandising",action:"Archive completed order"};
  if(intake==="Part received")return {owner:"Merchandising",action:"Chase remaining intake"};
  if(intake==="Shipped")return {owner:"Merchandising",action:"Track shipment to warehouse"};
  if(intake==="Delayed")return {owner:"Merchandising",action:"Resolve delayed intake"};
  if(intake==="In production")return {owner:"Merchandising",action:"Track supplier production and ETA"};
  if(intake==="Confirmed")return {owner:"Merchandising",action:"Track confirmed intake date"};
  return {owner:"Merchandising",action:"Track intake date"};
}

function today(){
  return new Date().toISOString().slice(0,10);
}

async function saveWorkflow(section,patch){
  if(!state.selectedId)return;
  localStorage.setItem("ordersActorName",val("actor-name"));
  const response=await apiFetch("/api/orders/workflow",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId,section,actorName:val("actor-name"),patch})});
  const result=await response.json();
  if(!response.ok||!result.ok)throw new Error(result.error||"Could not save workflow");
  state.selected=result.order;
  state.events=result.events||[];
  state.invoices=result.invoices||state.invoices||[];
  const index=state.orders.findIndex(order=>order.id===result.order.id);
  if(index!==-1)state.orders[index]=result.order;
  recalcMetrics();
  renderFilters();
  renderMetrics();
  renderOrders();
  renderDetail();
}

async function saveNextAction(){
  await saveWorkflow("next action",{nextActionOwner:val("next-owner"),nextActionUserId:val("next-assignee"),nextAction:val("next-action")}).catch(showError);
}

async function saveApproval(){
  const status=val("approval-status");
  const patch={
    approvalStatus:status,
    approvalBy:val("approval-by"),
    approvalDecidedAt:val("approval-date")||(["Approved","Changes requested","Rejected"].includes(status)?today():""),
    approvalNotes:val("approval-notes")
  };
  if(status==="Approved"&&val("payment-status")==="Not due")patch.paymentStatus="Awaiting invoice";
  await saveWorkflow("approval",patch).catch(showError);
}

    paymentType:val("payment-type"),
    paymentDueDate:val("payment-due"),
    paymentPaidDate:val("payment-paid")||(status==="Paid"?today():""),

function readFileAsDataUrl(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=()=>reject(new Error("Could not read invoice file"));
    reader.readAsDataURL(file);
  });
}

async function saveInvoice(){
  if(!state.selectedId)return;
  const editing=(state.invoices||[]).find(invoice=>invoice.id===state.editingInvoiceId)||null;
  const file=el("invoice-file")?.files?.[0]||null;
  if(file&&file.size>12_000_000){
    showError(new Error("Choose an invoice under 12 MB."));
    return;
  }
  if(!file&&!editing?.fileName&&!val("invoice-number")){
    showError(new Error("Upload an invoice file or add an invoice number."));
    return;
  }
  const sentToFd=Boolean(el("invoice-sent")?.checked);
  const paid=Boolean(el("invoice-paid")?.checked);
  const fileData=file?await readFileAsDataUrl(file):"";
  await saveInvoicePayload({
    id:state.editingInvoiceId||"",
    invoiceType:val("invoice-type"),
    invoiceNumber:val("invoice-number"),
    invoiceDate:val("invoice-date"),
    dueDate:val("invoice-due"),
    amount:val("invoice-amount"),
    currency:val("invoice-currency")||state.selected?.currency||"GBP",
    isReceived:Boolean(el("invoice-received")?.checked)||Boolean(file),
    sentToFd,
    status:paid?"Paid":sentToFd?"Sent to FD":val("invoice-status"),
    fileName:file?.name||"",
    mimeType:file?.type||"",
    fileData,
    notes:val("invoice-notes")
  }).catch(showError);
}

async function deleteInvoice(id){
  const invoice=(state.invoices||[]).find(item=>item.id===id);
  if(!invoice)return;
  if(!window.confirm(`Delete invoice ${invoice.invoiceNumber||invoice.invoiceType||"invoice"}?`))return;
  localStorage.setItem("ordersActorName",val("actor-name"));
  const response=await apiFetch("/api/orders/invoices/delete",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId,actorName:val("actor-name"),invoiceId:id})});
  const result=await response.json();
  if(!response.ok||!result.ok){showError(new Error(result.error||"Could not delete invoice"));return;}
  state.selected=result.order;
  state.invoices=result.invoices||[];
  state.events=result.events||[];
  if(state.editingInvoiceId===id)state.editingInvoiceId="";
  state.invoiceEditorOpen=false;
  const index=state.orders.findIndex(order=>order.id===result.order.id);
  if(index!==-1)state.orders[index]=result.order;
  recalcMetrics();
  renderFilters();
  renderMetrics();
  renderOrders();
  renderDetail();
}

async function toggleInvoice(id,key,checked){
  const invoice=(state.invoices||[]).find(item=>item.id===id);
  if(!invoice)return;
  const patch={...invoice,[key]:checked};
  if(key==="paid"){
    patch.status=checked?"Paid":invoice.sentToFd?"Sent to FD":"Awaiting FD";
    patch.sentToFd=checked?true:invoice.sentToFd;
    patch.isReceived=checked?true:invoice.isReceived;
  }
  if(key==="sentToFd"&&checked&&patch.status==="Awaiting FD")patch.status="Sent to FD";
  if(key==="sentToFd"&&!checked&&patch.status==="Sent to FD")patch.status="Awaiting FD";
  await saveInvoicePayload(patch).catch(showError);
}

async function saveInvoicePayload(invoice){
  localStorage.setItem("ordersActorName",val("actor-name"));
  const response=await apiFetch("/api/orders/invoices",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId,actorName:val("actor-name"),invoice})});
  const result=await response.json();
  if(!response.ok||!result.ok)throw new Error(result.error||"Could not save invoice");
  state.selected=result.order;
  state.invoices=result.invoices||[];
  state.events=result.events||[];
  state.editingInvoiceId="";
  state.invoiceEditorOpen=false;
  const index=state.orders.findIndex(order=>order.id===result.order.id);
  if(index!==-1)state.orders[index]=result.order;
  recalcMetrics();
  renderFilters();
  renderMetrics();
  renderOrders();
  renderDetail();
}

async function setArchiveSelected(archived){
  if(!state.selectedId)return;
  const label=archived?"archive":"restore";
  if(!window.confirm(`${archived?"Archive":"Restore"} ${state.selected?.orderNumber||"this order"}?`))return;
  localStorage.setItem("ordersActorName",val("actor-name"));
  const response=await apiFetch("/api/orders/archive",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId,actorName:val("actor-name"),archived})});
  const result=await response.json();
  if(!response.ok||!result.ok){showError(new Error(result.error||`Could not ${label} order`));return;}
  state.selected=result.order;
  state.events=result.events||[];
  state.invoices=result.invoices||[];
  state.users=result.users||state.users||[];
  const index=state.orders.findIndex(order=>order.id===result.order.id);
  if(index!==-1)state.orders[index]=result.order;
  recalcMetrics();
  renderFilters();
  renderMetrics();
  renderOrders();
  renderDetail();
}

async function deleteSelectedOrder(){
  if(!state.selectedId)return;
  if(!window.confirm(`Delete ${state.selected?.orderNumber||"this order"}? This cannot be undone.`))return;
  localStorage.setItem("ordersActorName",val("actor-name"));
  const response=await apiFetch("/api/orders/delete",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId,actorName:val("actor-name")})});
  const result=await response.json();
  if(!response.ok||!result.ok){showError(new Error(result.error||"Could not delete order"));return;}
  state.orders=state.orders.filter(order=>order.id!==state.selectedId);
  state.selectedId="";
  state.selected=null;
  state.events=[];
  state.invoices=[];
  recalcMetrics();
  renderFilters();
  renderMetrics();
  renderOrders();
  const next=filterOrders()[0];
  if(next)await selectOrder(next.id);
  else renderDetail();
}

async function saveIntake(){
  const status=val("intake-status");
  await saveWorkflow("intake",{
    intakeStatus:status,
    intakeEtaDate:val("intake-eta"),
    intakeConfirmedDate:val("intake-confirmed"),
    intakeActualDate:val("intake-actual")||(status==="Received"?today():""),
    intakeReference:val("intake-ref"),
    intakeNotes:val("intake-notes")
  }).catch(showError);
}

async function addNote(){
  if(!state.selectedId||!val("activity-note"))return;
  localStorage.setItem("ordersActorName",val("actor-name"));
  const response=await apiFetch("/api/orders/events",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({orderId:state.selectedId,actorName:val("actor-name"),message:val("activity-note")})});
  const result=await response.json();
  if(!response.ok||!result.ok){showError(new Error(result.error||"Could not add note"));return;}
  state.events=result.events||[];
  el("activity-note").value="";
  renderDetail();
}

function showError(error){
  el("detail").insertAdjacentHTML("afterbegin",`<div class="status err" style="margin-bottom:10px">${escapeHtml(error.message)}</div>`);
}

async function selectOrder(id){
  state.selectedId=id;
  state.editingInvoiceId="";
  state.invoiceEditorOpen=false;
  renderOrders();
  el("detail").innerHTML=`<section class="panel"><p class="empty-state">Loading order...</p></section>`;
  const response=await apiFetch(`/api/orders/detail?id=${encodeURIComponent(id)}`);
  const result=await response.json();
  if(!response.ok){throw new Error(result.error||"Could not load order");}
  state.selected=result.order;
  state.events=result.events||[];
  state.invoices=result.invoices||[];
  const index=state.orders.findIndex(order=>order.id===id);
  if(index!==-1)state.orders[index]=result.order;
  renderOrders();
  renderDetail();
}

async function loadWorkspace(){
  el("detail").innerHTML=`<section class="panel"><p class="empty-state">Loading orders...</p></section>`;
  const response=await apiFetch("/api/orders/workspace");
  const data=await response.json();
  state.orders=data.orders||[];
  state.metrics=data.metrics||{};
  state.users=data.users||[];
  recalcMetrics();
  renderMetrics();
  renderFilters();
  renderOrders();
  if(state.orders.length){
    await selectOrder(state.selectedId&&state.orders.some(order=>order.id===state.selectedId)?state.selectedId:state.orders[0].id);
  }else{
    renderDetail();
  }
}

["search","archive-filter","status-filter","owner-filter","role-filter"].forEach(id=>el(id).addEventListener("input",()=>{renderFilters();renderOrders();}));
el("refresh-btn").addEventListener("click",()=>loadWorkspace().catch(showError));
loadWorkspace().catch(error=>{
  renderMetrics();
  el("order-list").innerHTML="";
  el("detail").innerHTML=`<section class="panel"><p class="empty-state">${escapeHtml(error.message)}</p></section>`;
});
</script>
</body>
</html>
